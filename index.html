        // 選択されたレッスンの単語カバレッジに基づき、最適な「自然な文」を抽出するロジック
        function generateOfflineEnglishSentence(lessons) {
            // 選択されたレッスンの単語プール
            let availableWords = [];
            lessons.forEach(function(l) {
                if (wordDatabase[l]) {
                    availableWords = availableWords.concat(wordDatabase[l].map(o => o.w));
                }
            });

            // プリセット文の中から、選択されたレッスンの単語を多く含む順にフィルタリング
            const scoredPatterns = perfectConversations.map(function(item) {
                let matchCount = 0;
                item.words.forEach(function(w) {
                    if (availableWords.includes(w)) matchCount++;
                });
                return { pattern: item, score: matchCount };
            });

            // スコアの高い順に並び替え
            scoredPatterns.sort((a, b) => b.score - a.score);

            // 直近に使った文を除外（重複防止）
            const filtered = scoredPatterns.filter(item => !recentJpSentences.includes(item.pattern.jp));
            const candidates = filtered.length > 0 ? filtered : scoredPatterns; // 全部除外されたらリセット

            const highestScore = candidates[0].score;
            const bestMatches = candidates.filter(item => item.score === highestScore).map(item => item.pattern);

            const chosen = bestMatches[Math.floor(Math.random() * bestMatches.length)] || perfectConversations[0];

            // 履歴に追加
            recentJpSentences.push(chosen.jp);
            if (recentJpSentences.length > RECENT_HISTORY_SIZE) recentJpSentences.shift();

            return chosen;
        }

                    });
                    return found;
                });

                document.getElementById('question-jp').textContent = currentQuizData.jp;
                document.getElementById('answer-en').textContent = currentQuizData.en;
                renderTargetWordCards(offlineWords.length > 0 ? offlineWords : []);

                // オフラインバッジ
                const sdot2 = document.getElementById('status-dot');
                if (sdot2) sdot2.className = "w-3 h-3 rounded-full bg-amber-400 flex-shrink-0";
                const slabel2 = document.getElementById('api-status-label');
                if (slabel2) slabel2.textContent = "オフラインモード（プリセット問題）";
                const badge2 = document.getElementById('play-api-badge');
                if (badge2) { badge2.textContent = "⚡ オフライン"; badge2.className = "text-[9px] font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400 border border-amber-500/30"; }
            }

            showPlayArea(btn);
        }

        function renderTargetWordCards(targetWords) {
            const wordsContainer = document.getElementById('used-words-container');
            wordsContainer.innerHTML = "";
            targetWords.forEach(function(item) {
                const div = document.createElement('div');
                div.className = "bg-slate-800/80 border border-blue-500/30 rounded-xl p-3 shadow-md";
                div.innerHTML = `
                    <p class="text-xs font-black text-blue-400 tracking-wider">${item.w}</p>
                    <p class="text-[10px] text-slate-300 mt-0.5">${item.j}</p>
                `;
                wordsContainer.appendChild(div);
            });
        }

        function showPlayArea(btn) {
            document.getElementById('play-loading').classList.add('hidden');
            document.getElementById('play-content').classList.remove('hidden');
            document.getElementById('answer-box').classList.add('hidden', 'opacity-0', 'translate-y-4');

            playState = "QUESTION";
            btn.disabled = false;
            btn.textContent = "答えを見る";
            btn.className = "w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-black py-4.5 rounded-2xl shadow-xl shadow-blue-900/30 transition-all cursor-pointer";

            startTimer();
        }

        function handleMainAction() {
            const btn = document.getElementById('main-action-btn');

            if (playState === "QUESTION") {
                clearInterval(timerInterval);
                playState = "ANSWER";
                
                const answerBox = document.getElementById('answer-box');
                answerBox.classList.remove('hidden');
                setTimeout(function() {
                    answerBox.classList.remove('opacity-0', 'translate-y-4');
                }, 50);

                playTTS();

                btn.textContent = "次の問題へ";
                btn.className = "w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-black py-4.5 rounded-2xl shadow-xl shadow-emerald-900/30 transition-all cursor-pointer";
            } else if (playState === "ANSWER") {
                nextQuestion();
            }
        }

        function playTTS() {
            if (!currentQuizData || !currentQuizData.en) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentQuizData.en);
            utterance.lang = 'en-US';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
